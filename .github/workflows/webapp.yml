name: Webapp

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/**" # shared components consumed by the webapp via @shared
      - ".github/workflows/webapp.yml"
  workflow_dispatch: # manual trigger from the Actions tab

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        # Shared components in src/ import from packages declared in the root
        # package.json (lucide-vue-next, vue). Node module resolution walks up
        # from src/components/*.vue, so root node_modules must exist.
        run: npm ci

      - name: Install webapp dependencies
        working-directory: web
        run: npm ci

      - name: Build webapp
        working-directory: web
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Change PROJECT_NAME below if your Cloudflare Pages project is named differently.
          command: pages deploy web/dist --project-name=entavi-web --branch=main
